version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "=== Instalando dbt-redshift ==="
      - pip install dbt-redshift==1.8.*

  pre_build:
    commands:
      - echo "=== Configurando profiles ==="
      - mkdir -p ~/.dbt
      - echo cGJfYnJhc2lsbWFydDoKICB0YXJnZXQ6IHByb2QKICBvdXRwdXRzOgogICAgcHJvZDoKICAgICAgdHlwZTogcmVkc2hpZnQKICAgICAgaG9zdDogbG9jYWxob3N0CiAgICAgIHBvcnQ6IDU0MzkKICAgICAgZGJuYW1lOiBkZXYKICAgICAgc2NoZW1hOiBwYl9icm9uemUKICAgICAgdXNlcjogYWRtaW4KICAgICAgcGFzc3dvcmQ6IHBsYWNlaG9sZGVyCiAgICAgIHRocmVhZHM6IDQK | base64 -d > ~/.dbt/profiles.yml
      - echo cGJfYnJhc2lsbWFydDoKICB0YXJnZXQ6IHByb2QKICBvdXRwdXRzOgogICAgcHJvZDoKICAgICAgdHlwZTogcmVkc2hpZnQKICAgICAgaG9zdDogbG9jYWxob3N0CiAgICAgIHBvcnQ6IDU0MzkKICAgICAgZGJuYW1lOiBkZXYKICAgICAgc2NoZW1hOiBwYl9icm9uemUKICAgICAgdXNlcjogYWRtaW4KICAgICAgcGFzc3dvcmQ6IHBsYWNlaG9sZGVyCiAgICAgIHRocmVhZHM6IDQK | base64 -d > dbt/pb_brasilmart/profiles.yml

  build:
    commands:
      - echo "=== dbt parse ==="
      - cd dbt/pb_brasilmart
      - dbt deps 2>/dev/null || true
      - dbt parse
      - dbt compile
      - echo "=== dbt deploy validado com sucesso ==="
