version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "=== Instalando dbt-redshift ==="
      - pip install dbt-redshift==1.8.*

  pre_build:
    commands:
      - echo "=== Configurando profiles ==="
      - mkdir -p ~/.dbt
      - printf "pb_brasilmart:\n  target: prod\n  outputs:\n    prod:\n      type: redshift\n      host: localhost\n      port: 5439\n      dbname: dev\n      schema: pb_bronze\n      user: admin\n      password: placeholder\n      threads: 4\n" > ~/.dbt/profiles.yml
      - cat ~/.dbt/profiles.yml

  build:
    commands:
      - echo "=== dbt parse (validacao do projeto) ==="
      - cd dbt/pb_brasilmart
      - dbt deps 2>/dev/null || true
      - dbt parse
      - dbt compile
      - echo "=== dbt deploy validado com sucesso ==="
